name: Backfill Historical Releases

# Run manually only — one-time backfill of all tagged versions
on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Comma-separated tags to backfill (leave empty = all tags)'
        required: false
        default: ''

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Backfill releases for all tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # Determine which tags to process
          INPUT_TAGS="${{ github.event.inputs.tags }}"
          if [ -z "$INPUT_TAGS" ]; then
            TAGS=$(git tag --sort=creatordate)
          else
            TAGS=$(echo "$INPUT_TAGS" | tr ',' '\n')
          fi

          echo "Tags to backfill: $TAGS"

          for TAG in $TAGS; do
            echo ""
            echo "========================================"
            echo "Processing tag: $TAG"
            echo "========================================"

            # Check if release already exists
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")

            if [ "$STATUS" = "200" ]; then
              echo "Release $TAG already exists — checking if APK is attached..."
              HAS_APK=$(curl -s \
                -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(any('apk' in a['name'] for a in d.get('assets',[])))") || true
              if [ "$HAS_APK" = "True" ]; then
                echo "APK already attached — skipping"
                continue
              fi
              echo "No APK found — will build and attach"
            fi

            # Checkout the tag
            git checkout "$TAG" -- 2>/dev/null || { echo "Failed to checkout $TAG"; continue; }

            # Set up local.properties
            echo "sdk.dir=${ANDROID_HOME}" > local.properties

            # Make gradlew executable
            chmod +x gradlew

            # Read version from build.gradle.kts at this tag
            VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo "$TAG")
            VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -o '[0-9]*' || echo "0")
            echo "Version: $VERSION_NAME (code $VERSION_CODE)"

            # Read tag date
            TAG_DATE=$(git log -1 --format=%ai "$TAG" 2>/dev/null | head -1 || date -u +%Y-%m-%dT%H:%M:%SZ)
            echo "Tag date: $TAG_DATE"

            # Read commit message for release notes
            COMMIT_MSG=$(git log -1 --pretty=%B "$TAG" | head -10)

            # Build debug APK (release needs keystore so skip for old tags)
            echo "Building debug APK..."
            ./gradlew assembleDebug --no-daemon --quiet 2>&1 | tail -5 || { echo "Build failed for $TAG"; git checkout main -- 2>/dev/null; continue; }

            # Rename APK
            DEBUG_APK="EncryptBoard-${TAG}-debug.apk"
            mv app/build/outputs/apk/debug/app-debug.apk "$DEBUG_APK" 2>/dev/null || \
              cp app/build/outputs/apk/debug/*.apk "$DEBUG_APK" 2>/dev/null || true

            # Try release build too
            echo "Building release APK..."
            ./gradlew assembleRelease --no-daemon --quiet 2>&1 | tail -5 || echo "Release build skipped"

            RELEASE_APK=""
            if ls app/build/outputs/apk/release/*.apk 1>/dev/null 2>&1; then
              RELEASE_APK="EncryptBoard-${TAG}-release-unsigned.apk"
              cp app/build/outputs/apk/release/*.apk "$RELEASE_APK" 2>/dev/null || true
            fi

            # Create ZIP with both
            ZIP_FILE="EncryptBoard-${TAG}-all-apks.zip"
            zip -j "$ZIP_FILE" "$DEBUG_APK" $RELEASE_APK 2>/dev/null || zip -j "$ZIP_FILE" "$DEBUG_APK"
            ls -lh "$DEBUG_APK" "$ZIP_FILE" 2>/dev/null

            # Create or update GitHub Release
            BODY="## EncryptBoard ${TAG}

**Version:** ${VERSION_NAME} (build ${VERSION_CODE})
**Tag date:** ${TAG_DATE}

### Changes
\`\`\`
${COMMIT_MSG}
\`\`\`

---
| File | Description |
|---|---|
| \`${DEBUG_APK}\` | Debug APK — install directly on Android |
| \`${ZIP_FILE}\` | All APKs zipped |

> Enable **Install from unknown sources** in Android Settings before installing."

            if [ "$STATUS" = "200" ]; then
              # Get release ID and upload assets
              RELEASE_ID=$(curl -s \
                -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
                | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

              UPLOAD_URL="https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets"

              curl -s -X POST "${UPLOAD_URL}?name=${DEBUG_APK}" \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/vnd.android.package-archive" \
                --data-binary "@${DEBUG_APK}" > /dev/null

              curl -s -X POST "${UPLOAD_URL}?name=${ZIP_FILE}" \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/zip" \
                --data-binary "@${ZIP_FILE}" > /dev/null

              echo "Assets uploaded to existing release $TAG"
            else
              # Create new release
              gh release create "$TAG" \
                --title "EncryptBoard ${TAG} (build ${VERSION_CODE})" \
                --notes "$BODY" \
                "$DEBUG_APK" \
                "$ZIP_FILE" \
                || echo "Failed to create release for $TAG"

              echo "Created release $TAG"
            fi

            # Cleanup built files before next iteration
            rm -f "$DEBUG_APK" "$RELEASE_APK" "$ZIP_FILE" 2>/dev/null || true
            rm -rf app/build/outputs/apk/ 2>/dev/null || true

            # Return to default state
            git checkout main -- 2>/dev/null || true

          done

          echo ""
          echo "Backfill complete!"
